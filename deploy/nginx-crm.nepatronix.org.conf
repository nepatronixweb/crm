# Nginx reverse proxy for ETG CRM
# Domain: crm.nepatronix.org  →  Next.js on 127.0.0.1:3001
#
# Install on Ubuntu/Debian VPS:
#   sudo cp deploy/nginx-crm.nepatronix.org.conf /etc/nginx/sites-available/crm.nepatronix.org
#   sudo ln -sf /etc/nginx/sites-available/crm.nepatronix.org /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d crm.nepatronix.org

server {
    listen 80;
    listen [::]:80;
    server_name crm.nepatronix.org;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crm.nepatronix.org;

    # certbot fills these after: sudo certbot --nginx -d crm.nepatronix.org
    ssl_certificate     /etc/letsencrypt/live/crm.nepatronix.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.nepatronix.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # SSE: notifications + chat streams
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
